<!doctype html>
<html lang="en">

    <title>Don't Explode</title>
    <link rel="stylesheet" href="styles.css" />

  <body>
    <main class="page">
      <section class="poster" aria-label="Don't explode poster">

              <stop offset="100%" stop-color="#c55ae1" />

          <rect x="12" y="12" width="396" height="696" rx="52" fill="#0a0a0a" />

          <path
            d="M70 130 C70 70 130 50 200 50 H270 C340 50 380 90 380 160 V330 C380 400 340 440 270 440 H200 C130 440 70 400 70 330 Z"
            fill="url(#redGlow)"

          <g transform="translate(0, 10)">

              d="M150 280 C40 320 40 520 190 570 C300 600 350 520 320 450 C300 400 230 390 220 330 C210 290 260 250 300 240"
              fill="none"
              stroke="url(#catMain)"

              stroke-linejoin="round"
            />
            <path
              d="M150 280 C40 320 40 520 190 570 C300 600 350 520 320 450 C300 400 230 390 220 330 C210 290 260 250 300 240"
              fill="none"
              stroke="#b792d7"
              stroke-width="70"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-dasharray="34 34"
              opacity="0.8"
            />

            <ellipse cx="260" cy="520" rx="110" ry="70" fill="url(#catMain)" />
            <path
              d="M175 520 C210 540 250 550 320 535"
              fill="none"
              stroke="#b792d7"
              stroke-width="18"
              stroke-linecap="round"
            />
            <path
              d="M190 500 C230 520 270 525 330 515"
              fill="none"
              stroke="#7a2d99"
              stroke-width="12"
              stroke-linecap="round"
              opacity="0.6"
            />

            <circle cx="320" cy="490" r="60" fill="url(#catMain)" />
            <path
              d="M280 455 L300 430 L310 470 Z"
              fill="#7a2d99"
            />
            <path
              d="M350 455 L330 430 L320 470 Z"

            />
            <ellipse cx="300" cy="490" rx="16" ry="20" fill="#f2d93c" />
            <ellipse cx="338" cy="490" rx="16" ry="20" fill="#f2d93c" />
            <circle cx="300" cy="492" r="6" fill="#2d1f1f" />
            <circle cx="338" cy="492" r="6" fill="#2d1f1f" />
            <ellipse cx="320" cy="515" rx="14" ry="10" fill="#9b1d1d" />

            <path
              d="M275 520 C295 550 340 550 360 520"
              fill="#ffffff"
              stroke="#1a1a1a"
              stroke-width="6"
              stroke-linecap="round"
            />
            <path
              d="M284 525 L296 540 M300 526 L312 542 M316 527 L328 542 M332 526 L346 540"
              stroke="#1a1a1a"
              stroke-width="4"
              stroke-linecap="round"
            />

          <text x="86" y="650" class="poster-title">don&apos;t</text>
          <text x="86" y="688" class="poster-subtitle">explode...</text>
        </svg>
      </section>
    </main>
  </body>
</html>
